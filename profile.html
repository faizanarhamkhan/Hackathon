<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpHub AI - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #E9F0EC 0%, #F7F1E5 100%); 
            color: #0B231D; 
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* NAVIGATION WITH SHADOW LINE */
        .nav-container {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-link {
            font-size: 13px;
            font-weight: 600;
            color: #6B7280;
            transition: color 0.2s;
        }

        .nav-link:hover { color: #000; }

        .nav-active {
            background: #D9E5E1;
            color: #168B75;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 700;
        }

        /* THEME HEADER BOX */
        .header-section {
            background-color: #2D3639;
            border-radius: 40px;
            padding: 60px 50px;
            color: white;
            margin: 0 auto 40px auto;
            max-width: 1200px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        label {
            font-size: 10px;
            font-weight: 700;
            color: #168B75;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            display: block;
        }

        /* CONTENT CONTAINERS */
        .profile-card {
            background: white;
            border-radius: 40px;
            padding: 45px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* FORM ELEMENTS */
        .input-field {
            width: 100%;
            padding: 12px 18px;
            border-radius: 12px;
            background: white;
            border: 1px solid #EBEBE6;
            font-size: 13px;
            margin-bottom: 20px;
            color: #0B231D;
        }

        .pill {
            font-size: 11px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            background: #F9F9F7;
            border: 1px solid #D9E5E1;
            color: #168B75;
        }

        .btn-save {
            background: #168B75;
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 10px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #F1F1F1;
        }
    </style>
</head>
<body>

    <nav class="nav-container">
        <div class="flex items-center gap-3">
            <div class="bg-[#168B75] text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm">H</div>
            <span class="font-bold text-lg tracking-tight">HelpHub AI</span>
        </div>

        <div class="nav-links">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="onboarding.html" class="nav-link">Onboarding</a>
            <div class="nav-active">Profile</div>
        </div>
    </nav>

    <header class="header-section">
        <label>Profile</label>
        <h1 class="text-6xl font-bold leading-tight mb-3 tracking-tight">Ayesha Khan</h1>
        <p class="text-gray-400 text-sm font-medium">Both • Karachi</p>
    </header>

    <main class="max-w-[1200px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 pb-20">
        
        <section class="lg:col-span-7 profile-card">
            <label>Public Profile</label>
            <h2 class="text-4xl font-bold mb-8 tracking-tight">Skills and reputation</h2>
            
            <div class="stats-row">
                <span class="text-gray-500 font-medium">Trust score</span>
                <span class="font-bold">92%</span>
            </div>
            <div class="stats-row mb-8">
                <span class="text-gray-500 font-medium">Contributions</span>
                <span class="font-bold">31</span>
            </div>

            <div class="mb-8">
                <label style="color: #0B231D;">Skills</label>
                <div class="flex flex-wrap gap-2 mt-3">
                    <span class="pill">Figma</span>
                    <span class="pill">UI/UX</span>
                    <span class="pill">HTML/CSS</span>
                    <span class="pill">Career Guidance</span>
                </div>
            </div>

            <div>
                <label style="color: #0B231D;">Badges</label>
                <div class="flex flex-wrap gap-2 mt-3">
                    <span class="pill">Design Ally</span>
                    <span class="pill">Fast Responder</span>
                    <span class="pill">Top Mentor</span>
                </div>
            </div>
        </section>

        <section class="lg:col-span-5 profile-card" style="background: #F7F1E5;">
            <label>Edit Profile</label>
            <h2 class="text-4xl font-bold mb-8 tracking-tight">Update your identity</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label style="color: #6B7280; text-transform: capitalize;">Name</label>
                    <input type="text" class="input-field" value="Ayesha Khan">
                </div>
                <div>
                    <label style="color: #6B7280; text-transform: capitalize;">Location</label>
                    <input type="text" class="input-field" value="Karachi">
                </div>
            </div>

            <label style="color: #6B7280; text-transform: capitalize;">Skills</label>
            <input type="text" class="input-field" value="Figma, UI/UX, HTML/CSS, Career Guidance">

            <label style="color: #6B7280; text-transform: capitalize;">Interests</label>
            <input type="text" class="input-field" value="Hackathons, UI/UX, Community Building">

            <button class="btn-save">Save profile</button>
        </section>
    </main>

</body>
</html>
